spring:
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.actuate.web.servlet.ManagementWebSecurityAutoConfiguration
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
  datasource:
    url: jdbc:tc:mysql:8.4.8:///aggregate?TC_DAEMON=true&user=root&password=test&useInformationSchema=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: root
    password: test
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
management:

  endpoints:
    web:
      exposure:
        include:
          - health
          - prometheus
          - loggers
  endpoint:
    health:
      probes:
        enabled: true
auth:
  token:
    salt: remittance-token-salt
    access-expires-in: ${AUTH_TOKEN_ACCESS_EXPIRES_IN:3600}
    refresh-expires-in: ${AUTH_TOKEN_REFRESH_EXPIRES_IN:604800}
  internal:
    token: ${AUTH_INTERNAL_TOKEN:remittance-internal-token}
transfer:
  idempotency-key:
    expires-in: 24h

logging:
  level:
    liquibase: debug
