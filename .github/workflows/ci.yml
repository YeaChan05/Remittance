name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Package JARs
        run: ./gradlew jar bootJar

      - name: Test
        run: ./gradlew test --parallel

      - name: Integration Test
        run: ./gradlew integrationTest --parallel

      - name: Jacoco report
        run: ./gradlew jacocoRootReport -x test -x integrationTest

      - name: Upload coverage
        uses: madrapps/jacoco-report@v1.2
        with:
          title: Jacoco Coverage Report
          paths: ${{ github.workspace }}/build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85

  impact:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      skip_run: ${{ steps.impacted.outputs.skip_run }}
      full_run: ${{ steps.impacted.outputs.full_run }}
      test_tasks: ${{ steps.impacted.outputs.test_tasks }}
      integration_test_tasks: ${{ steps.impacted.outputs.integration_test_tasks }}
      summary: ${{ steps.impacted.outputs.summary }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve git range
        id: git-range
        shell: bash
        run: |
          echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve impacted modules
        id: impacted
        shell: bash
        run: |
          bash ./.github/scripts/resolve-impacted-modules.sh \
            --base "${{ steps.git-range.outputs.base_sha }}" \
            --head "${{ steps.git-range.outputs.head_sha }}"

      - name: Print impact summary
        shell: bash
        run: |
          cat <<'EOF'
          ${{ steps.impacted.outputs.summary }}
          EOF

      - name: Skip CI for non-functional changes
        if: steps.impacted.outputs.skip_run == 'true'
        run: echo "Skipping Gradle CI because only non-functional files changed."

  unit-test:
    if: github.event_name == 'pull_request' && needs.impact.outputs.skip_run != 'true'
    needs: impact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Unit Test
        shell: bash
        run: |
          if [[ "${{ needs.impact.outputs.full_run }}" == "true" ]]; then
            ./gradlew test --parallel
          else
            ./gradlew ${{ needs.impact.outputs.test_tasks }} --parallel
          fi

  integration-test:
    if: github.event_name == 'pull_request' && needs.impact.outputs.skip_run != 'true'
    needs: impact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Integration Test
        shell: bash
        run: |
          if [[ "${{ needs.impact.outputs.full_run }}" == "true" ]]; then
            ./gradlew integrationTest --parallel
          else
            ./gradlew ${{ needs.impact.outputs.integration_test_tasks }} --parallel
          fi
