name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew assemble

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test
        run: ./gradlew test --parallel

      - name: Upload unit test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-jacoco-exec
          path: |
            **/build/jacoco/*.exec
          if-no-files-found: error

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Integration test
        run: ./gradlew integrationTest --parallel

      - name: Upload integration test coverage data
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-jacoco-exec
          path: |
            **/build/jacoco/*.exec
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    needs:
      - test
      - integration-test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version-file: .sdkmanrc

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: '*-jacoco-exec'
          path: .
          merge-multiple: true

      - name: Jacoco report
        run: ./gradlew classes jacocoRootReport -x test -x integrationTest

      - name: Upload coverage
        uses: madrapps/jacoco-report@v1.2
        with:
          title: 📝 테스트 커버리지 리포트입니다
          paths: ${{ github.workspace }}/build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 85
